global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    scrape_interval: 2s
    static_configs:
    - targets: ['opentelemetry-collector:8889']

  - job_name: 'mongodb-exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['mongodb-exporter:9216']

storage:
  tsdb:
    out_of_order_time_window: 30m