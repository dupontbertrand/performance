<template name="dashboard">
  <h2>Recent Benchmark Runs</h2>

  {{#if Template.subscriptionsReady}}
    {{#if hasRuns}}
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>Date</th>
              <th>Tag</th>
              <th>Scenario</th>
              <th>Wall Clock</th>
              <th>CPU avg</th>
              <th>RAM avg</th>
              <th>GC pause</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {{#each runs}}
              <tr>
                <td>{{formatDate timestamp}}</td>
                <td><span class="badge bg-primary">{{tag}}</span></td>
                <td><a href="/scenario/{{scenario}}">{{scenario}}</a></td>
                <td>{{formatMs wall_clock_ms}}</td>
                <td>{{cpuAvg}}%</td>
                <td>{{ramAvg}} MB</td>
                <td>{{gcPause}} ms</td>
                <td>{{{statusBadge}}}</td>
                <td><a href="/run/{{_id}}" class="btn btn-sm btn-outline-secondary">Detail</a></td>
              </tr>
            {{/each}}
          </tbody>
        </table>
      </div>
    {{else}}
      <div class="alert alert-info">
        No benchmark runs yet. Push results with: <code>node bench.js push --result &lt;file.json&gt;</code>
      </div>
    {{/if}}
  {{else}}
    <div class="text-center my-5">
      <div class="spinner-border" role="status"></div>
      <p class="mt-2">Loading...</p>
    </div>
  {{/if}}
</template>
