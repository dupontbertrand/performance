<template name="scenario">
  {{#with info}}
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>{{name}}</h2>
      <a href="/" class="btn btn-outline-secondary">Back</a>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">What does this scenario do?</div>
          <div class="card-body">
            <p class="mb-0">{{summary}}</p>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">At a glance</div>
          <div class="card-body">
            <table class="table table-sm mb-0">
              <tr><td>Driver</td><td><span class="badge bg-secondary">{{driver}}</span></td></tr>
              <tr><td>Virtual users</td><td>{{vus}}</td></tr>
              <tr><td>Duration</td><td>{{duration}}</td></tr>
              <tr><td>Requires browser</td><td>{{#if browser}}Yes (Chromium){{else}}No{{/if}}</td></tr>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">Technical details</div>
      <div class="card-body">
        <p>{{{technical}}}</p>
      </div>
    </div>

    <h4>Recent runs for this scenario</h4>
    {{#if hasRuns}}
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>Date</th>
              <th>Tag</th>
              <th>Wall Clock</th>
              <th>CPU avg</th>
              <th>RAM avg</th>
              <th>GC pause</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {{#each runs}}
              <tr>
                <td>{{formatDate timestamp}}</td>
                <td><span class="badge bg-primary">{{tag}}</span></td>
                <td>{{formatMs wall_clock_ms}}</td>
                <td>{{cpuAvg}}%</td>
                <td>{{ramAvg}} MB</td>
                <td>{{gcPause}} ms</td>
                <td><a href="/run/{{_id}}" class="btn btn-sm btn-outline-secondary">Detail</a></td>
              </tr>
            {{/each}}
          </tbody>
        </table>
      </div>
    {{else}}
      <div class="alert alert-info">No runs yet for this scenario.</div>
    {{/if}}
  {{else}}
    <div class="alert alert-warning">Unknown scenario: <strong>{{scenarioName}}</strong></div>
    <a href="/" class="btn btn-outline-secondary">Back</a>
  {{/with}}
</template>
