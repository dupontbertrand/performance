<template name="detail">
  {{#if Template.subscriptionsReady}}
    {{#with run}}
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
          <span class="badge bg-primary">{{tag}}</span>
          <a href="/scenario/{{scenario}}" class="text-decoration-none">{{scenario}}</a>
        </h2>
        <a href="/" class="btn btn-outline-secondary">Back</a>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">Run Info</div>
            <div class="card-body">
              <table class="table table-sm mb-0">
                <tr><td>Date</td><td>{{formatDate timestamp}}</td></tr>
                <tr><td>Tag</td><td>{{tag}}</td></tr>
                <tr><td>Scenario</td><td>{{scenario}}</td></tr>
                <tr><td>Meteor version</td><td>{{meteor.version}}</td></tr>
                <tr><td>Meteor SHA</td><td><code>{{meteor.sha}}</code></td></tr>
                <tr><td>Wall clock</td><td>{{formatMs wall_clock_ms}}</td></tr>
                {{#if source}}<tr><td>Source</td><td>{{source}}</td></tr>{{/if}}
                {{#if prNumber}}<tr><td>PR</td><td>#{{prNumber}}</td></tr>{{/if}}
              </table>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card">
            <div class="card-header">App Resources</div>
            <div class="card-body">
              <table class="table table-sm mb-0">
                <tr><td>CPU avg</td><td>{{appCpuAvg}}%</td></tr>
                <tr><td>CPU max</td><td>{{appCpuMax}}%</td></tr>
                <tr><td>RAM avg</td><td>{{appRamAvg}} MB</td></tr>
                <tr><td>RAM max</td><td>{{appRamMax}} MB</td></tr>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">DB Resources</div>
            <div class="card-body">
              <table class="table table-sm mb-0">
                <tr><td>CPU avg</td><td>{{dbCpuAvg}}%</td></tr>
                <tr><td>RAM avg</td><td>{{dbRamAvg}} MB</td></tr>
              </table>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card">
            <div class="card-header">Garbage Collection</div>
            <div class="card-body">
              <table class="table table-sm mb-0">
                <tr><td>GC count</td><td>{{gcCount}}</td></tr>
                <tr><td>Total pause</td><td>{{gcTotalPause}} ms</td></tr>
                <tr><td>Max pause</td><td>{{gcMaxPause}} ms</td></tr>
                <tr><td>Avg pause</td><td>{{gcAvgPause}} ms</td></tr>
                <tr><td>Minor (scavenge)</td><td>{{gcMinorCount}} ({{gcMinorMs}} ms)</td></tr>
                <tr><td>Major (full)</td><td>{{gcMajorCount}} ({{gcMajorMs}} ms)</td></tr>
              </table>
            </div>
          </div>
        </div>
      </div>
    {{else}}
      <div class="alert alert-warning">Run not found.</div>
    {{/with}}
  {{else}}
    <div class="text-center my-5">
      <div class="spinner-border" role="status"></div>
    </div>
  {{/if}}
</template>
