<template name="trends">
  <h2>Performance Trends</h2>

  <div class="row mb-4">
    <div class="col-md-4">
      <label class="form-label">Scenario</label>
      <select class="form-select" id="trendScenario">
        {{#each scenarios}}
          <option value="{{this}}">{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Metric</label>
      <select class="form-select" id="trendMetric">
        <option value="wall_clock">Wall Clock (s)</option>
        <option value="cpu_avg">APP CPU avg (%)</option>
        <option value="ram_avg">APP RAM avg (MB)</option>
        <option value="gc_total">GC total pause (ms)</option>
        <option value="gc_max">GC max pause (ms)</option>
        <option value="gc_count">GC count</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Tag filter (optional)</label>
      <select class="form-select" id="trendTag">
        <option value="">All tags</option>
        {{#each tags}}
          <option value="{{this}}">{{this}}</option>
        {{/each}}
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <canvas id="trendChart" height="100"></canvas>
    </div>
  </div>

  {{#unless hasData}}
    <div class="alert alert-info mt-3">No data for this selection yet.</div>
  {{/unless}}
</template>
